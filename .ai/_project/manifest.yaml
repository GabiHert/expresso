# ============================================================
# PROJECT IDENTITY
# ============================================================
project:
  name: "Deel Platform"
  description: "Global HR and payroll platform with PEO, EOR, and contractor management services"
  root: "/Users/gabriel.herter/Documents/Projects/new_deel"

# ============================================================
# REPOSITORIES
# ============================================================
repos:
  - name: backend
    path: ./backend
    description: "Main backend API - Express.js monolith with Sequelize ORM"
    tech: [javascript, typescript, express, sequelize, postgresql, nats]

  - name: frontend
    path: ./frontend
    description: "Client-facing React application with MobX state management"
    tech: [typescript, react, vite, mobx, capacitor]

  - name: admin
    path: ./admin
    description: "Internal admin dashboard - Nx monorepo with React"
    tech: [typescript, react, vite, mobx, nx]

  - name: peo
    path: ./peo
    description: "PEO (Professional Employer Organization) service API"
    tech: [typescript, express, sequelize, postgresql, nats]

  - name: payroll-processing-api
    path: ./payroll-processing-api
    description: "Payroll processing service with Prisma/Sequelize"
    tech: [typescript, express, prisma, sequelize, postgresql]

  - name: benefits
    path: ./benefits
    description: "Benefits management service API"
    tech: [typescript, express, sequelize, postgresql, nats]

  - name: playwright-automation
    path: ./playwright-automation
    description: "E2E testing framework for all Deel platforms"
    tech: [typescript, playwright]

  - name: employment
    path: ./employment
    description: "Employment management service"
    tech: [typescript]

  - name: time-off
    path: ./time-off
    description: "Time-off and leave management service"
    tech: [typescript]

  - name: payments
    path: ./payments
    description: "Payment processing service"
    tech: [typescript]

  - name: accounting
    path: ./accounting
    description: "Accounting and financial services"
    tech: [typescript]

  - name: eor-experience
    path: ./eor-experience
    description: "EOR (Employer of Record) experience service"
    tech: [typescript]

# ============================================================
# MCP INTEGRATIONS
# ============================================================
mcps:
  available:
    - name: sql-query
      description: "Direct PostgreSQL database queries"
    - name: notification-server
      description: "Discord notifications for task events"
    - name: context7
      description: "Library documentation lookup"
    - name: playwright
      description: "Browser automation and testing"
  optional:
    - name: peo-manager
      description: "PEO contract management operations"
    - name: backend-manager
      description: "Backend server management and route execution"

# ============================================================
# CONVENTIONS
# ============================================================
conventions:
  commits:
    no_coauthor: true
    require_jira: true
    pattern: "[BRANCHNAME]: message..."
    types: [feat, fix, chore, refactor, test, docs]

  branches:
    pattern: "{JIRA}-{short-description}"

  jira:
    prefix: "PEOCM"
    url: "https://letsdeel.atlassian.net"

# ============================================================
# AGENT PREFERENCES
# ============================================================
agents:
  exploration: Explore
  explore:
    default_thoroughness: "medium"

# ============================================================
# NOTIFICATIONS
# ============================================================
notifications:
  on_task_create: true
  on_task_done: true
  on_error: true
  mention_user: false

# ============================================================
# FRAMEWORK VERSION CONTROL
# ============================================================
framework:
  repo: "GabiHert/ai-framework"
  branch: "project/deel-platform"
  track_customizations: true
